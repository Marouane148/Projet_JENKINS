services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins-master
    privileged: true
    ports:
      - "${JENKINS_HOST_PORT:-8080}:8080"
      - "${JENKINS_AGENT_PORT:-50000}:50000"
    environment:
      - JAVA_OPTS=-Xmx2048m -Xms512m -Djenkins.install.runSetupWizard=false
      - JENKINS_JAVA_OPTS=-Xmx2048m -Xms512m
      - JAVA_HOME=/opt/java/openjdk
      - MAVEN_HOME=/usr/share/maven
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    networks:
      - jenkins_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/json"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  jenkins_home:
    driver: local

networks:
  jenkins_network:
    driver: bridge
